<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Andalusia 2026</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="fx-bg" aria-hidden="true"></div>
  <div class="appShell">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">✈</div>
        <div>
          <h1>Andalusia 2026</h1>
          <p id="sourceMeta" class="muted">Fonte dati: Google Sheets</p>
        </div>
      </div>

      <section class="sidebarCard">
        <h2>Controlli</h2>
        <div class="btnRow">
          <button class="btn secondary" id="btnReload">Ricarica dati</button>
          <button class="btn ghost" id="btnClearGeo">Reset cache geo</button>
        </div>
      </section>

      <section class="sidebarCard">
        <h2>Filtri</h2>
        <div class="filters">
          <input id="q" type="text" placeholder="Cerca città, hotel, note..." />
          <select id="type">
            <option value="">Tutti i tipi</option>
            <option value="Trip">Trip</option>
            <option value="Notte">Notte</option>
          </select>
          <select id="city"><option value="">Tutte le città</option></select>
          <select id="status"><option value="">Tutti gli stati</option></select>
        </div>
      </section>

      <section class="sidebarCard kpiGrid" id="kpiPanel">
        <article class="kpi"><span class="k">Giorni</span><strong id="kDays">—</strong></article>
        <article class="kpi"><span class="k">Trip</span><strong id="kTrips">—</strong></article>
        <article class="kpi"><span class="k">Notti</span><strong id="kNights">—</strong></article>
        <article class="kpi"><span class="k">Km</span><strong id="kKm">—</strong></article>
        <article class="kpi"><span class="k">Costo</span><strong id="kCost">—</strong></article>
        <article class="kpi"><span class="k">Prenotazioni confermate</span><strong id="kBooked">—</strong></article>
      </section>
    </aside>

    <main class="workspace">
      <header class="workspaceHead">
        <nav class="tabs">
          <button class="tab active" data-tab="trip">Trip</button>
          <button class="tab" data-tab="night">Pernottamenti</button>
          <button class="tab" data-tab="map">Mappa</button>
        </nav>
        <div class="muted" id="metaCount">—</div>
      </header>

      <section id="view-trip" class="view">
        <article class="panel">
          <div class="panelHd"><h3>Piano Trip</h3><span class="muted" id="tripMeta">—</span></div>
          <div class="panelBd stack" id="tripList"></div>
        </article>
      </section>

      <section id="view-night" class="view hidden">
        <article class="panel">
          <div class="panelHd"><h3>Pernottamenti</h3><span class="muted" id="nightMeta">—</span></div>
          <div class="panelBd stack" id="nightList"></div>
        </article>
      </section>

      <section id="view-map" class="view hidden">
        <article class="panel">
          <div class="panelHd mapHd">
            <h3>Mappa operativa</h3>
            <div class="modeSwitch">
              <button class="modeBtn active" data-mode="route">Rotta</button>
              <button class="modeBtn" data-mode="night">Pernottamenti</button>
            </div>
            <span class="muted" id="mapMeta">—</span>
          </div>
          <div class="panelBd">
            <div id="map"></div>
            <p class="muted" id="mapHint">Rotta: Partenza/Arrivo/Luogo • Pernottamenti: Indirizzo con fallback</p>
          </div>
        </article>
      </section>
    </main>
  </div>

  <div id="nightModal" class="modal hidden" aria-hidden="true">
    <div class="modalCard" role="dialog" aria-modal="true" aria-label="Dettaglio pernottamento">
      <div class="modalHd">
        <h3>Dettaglio pernottamento</h3>
        <button class="btn ghost" id="btnCloseModal">Chiudi</button>
      </div>
      <div class="modalBd" id="nightModalBody"></div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
